version: '3.8'

services:
  nightlamp:
    build: .
    container_name: nightlamp-health-checks
    ports:
      - "3000:3000"
    environment:
      - SENTRY_AUTH_TOKEN=${SENTRY_AUTH_TOKEN}
      - SENTRY_ORG_SLUG=${SENTRY_ORG_SLUG}
      - SENTRY_PROJECT_SLUG=${SENTRY_PROJECT_SLUG}
      - UPTIMEROBOT_API_KEY=${UPTIMEROBOT_API_KEY}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - STRIPE_PRICE_BASIC=${STRIPE_PRICE_BASIC:-price_basic_monthly}
      - STRIPE_PRICE_ADVANCED=${STRIPE_PRICE_ADVANCED:-price_advanced_monthly}
      - STRIPE_PRICE_WHITE_GLOVE=${STRIPE_PRICE_WHITE_GLOVE:-price_white_glove_monthly}
      - BASE_URL=${BASE_URL:-http://localhost:3000}
      - API_PORT=3000
      - POLL_INTERVAL_SEC=60
      - DB_PATH=/data/nightlamp.db
      - PLAYBOOK_DIR=/app/playbook
    volumes:
      - nightlamp-data:/data
      - nightlamp-playbook:/app/playbook

volumes:
  nightlamp-data:
  nightlamp-playbook: