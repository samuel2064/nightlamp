services:
  - type: web
    name: nightlamp-staging
    runtime: docker
    repo: https://github.com/Nightlamp/nightlamp
    plan: free
    region: oregon
    envVars:
      - key: NODE_ENV
        value: staging
      - key: DATABASE_PATH
        value: /data/nightlamp.db
      - key: PORT
        value: "10000"
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: SENTRY_DSN
        sync: false
      - key: UPTIMEROBOT_API_KEY
        sync: false
      - key: UPTIMEROBOT_MAIN_MONITOR_ID
        sync: false
    disk:
      name: data
      mountPath: /data
      sizeGB: 1
    healthCheckPath: /health
